{% extends 'homebase.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<section class="min-h-screen bg-gray-100 flex items-center justify-center py-12">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">
                Welcome Back
            </h1>

            <p class="text-gray-500 mt-2">
                Login to continue managing your inventory
            </p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Username
                </label>
                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required>
            </div>

            <!-- Submit -->
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
                Login
            </button>

        </form>

        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-gray-600">
                Don't have an account?
                <a href="{% url 'registration' %}"
                   class="text-indigo-600 font-semibold hover:underline">
                    Register
                </a>
            </p>
        </div>

    </div>

</section>

{% endblock %}
