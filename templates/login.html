{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">

    <h2 class="text-2xl font-bold mb-4">
        Login
    </h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded">
            Login
        </button>
    </form>

</div>
{% endblock %}
